name: E2E Tests (Playwright + Cucumber)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      suite:
        description: "Suite to run: smoke, regression, sanity"
        required: true
        default: smoke

jobs:
  e2e:
    name: Run E2E Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      HEADLESS: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Select suite command
        id: suite_cmd
        shell: bash
        run: |
          SUITE_INPUT="${{ github.event.inputs.suite }}"
          if [ -z "$SUITE_INPUT" ]; then
            SUITE_INPUT="smoke"
          fi

          SUITE_LOWER=$(echo "$SUITE_INPUT" | tr '[:upper:]' '[:lower:]')
          case "$SUITE_LOWER" in
            smoke|regression|sanity)
              echo "command=npm test -- $SUITE_LOWER" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Invalid suite: $SUITE_LOWER"
              exit 1
              ;;
          esac

      - name: Run selected E2E suite
        run: ${{ steps.suite_cmd.outputs.command }}

      - name: Generate HTML report
        if: always()
        run: npm run report

      - name: Upload execution artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-${{ github.run_number }}
          path: |
            reports/**
          if-no-files-found: warn
